<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="script.js"></script>
</head>
<body>
    <style>
        #container{
            background-color: blueviolet;
            width: 385px;
            height: 400px;
            margin-left: 550px;
            margin-top: 180px;
            border-radius: 30px;
            
        }
        #top{
            margin-left: 41px;
            padding-top: 50px;
            top: 100px;
           
        }
        button{
            margin-top: 20px;
            padding: 5px;
            width: 300px;
            height: 40px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            font-size: 15px;
        }
        textarea{
            width: 290px;
            height: 100px;
            border-radius: 25px;
            padding-left: 8px;
        }
        h2{
            position: relative;
            left: 80px;
        }
        </style>
    <div id="container">
        <div id="top">
            <h2> Please speak</h2>
            <textarea name="" id="name"></textarea>
        <button onclick="speakText()">Speak</button>
        </div>
    </div>
    
    <script>
        var speech = new SpeechSynthesisUtterance();
        function speakText(){
            var textToSpeak = document.getElementById('name').value;
            if(textToSpeak.trim()!=""){
                speech.text=textToSpeak;
                speech.rate = 1;
                speech.volume = 1;
                speech.pitch = 1;
                window.speechSynthesis.speak(speech);

            }
            else{
                alert("enter some text.");
            }
        }

    </script>
</body>
</html>
