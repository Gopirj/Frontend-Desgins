<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Travel Landing Page</title>
</head>
<body>
    <section class="showcase">
        <header>
            <h1 class="logo">Travel</h1>
            <div class="toggle"></div>
        </header>
        <video src="../new website/image/video (1080p).mp4" muted loop autoplay></video>
        
        <div class="overplay"></div>
        <div class="text">
            <h2>Never Stop</h2>
            <h3>Exploring The World</h3>
            <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Provident maxime cupiditate consectetur
                 tempore ab magnam id, autem ipsa eaque nihil!</p>
                 <a href="#">Explore</a>
        </div>
        <ul class="social">
            <li><a href="#"></a><img src="../new website/image/facebook (1).png" alt=""></a></li>
            <li><a href="#"></a><img src="../new website/image/twitter (1).png" alt=""></a></li>
            <li><a href="#"></a><img src="../new website/image/instgram.png" alt=""></a></li>
        </ul>
    </section>

    <div class="menu">
        <ul>
            <li><a href="#">Home</a></li>
            <li><a href="#">News</a></li>
            <li><a href="#">Destination</a></li>
            <li><a href="#">Blog</a></li>
            <li><a href="#">Contact</a></li>
        </ul>
    </div>
    <script>
        const menuToggle=document.querySelector('.toggle')
        const showcase= document.querySelector('.showcase')
        
        menuToggle.addEventListener('click',()=>{
            menuToggle.classList.toggle('active')
            showcase.classList.toggle('active')
        })
    </script>
</body>
</html>
